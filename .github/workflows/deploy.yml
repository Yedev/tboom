name: 构建并部署到阿里云

on:
  push:
    branches:
      - main

env:
  # 请根据你的阿里云 ACR 配置替换下方值
  REGISTRY: crpi-pcnycfgdwvbfz2xa.cn-chengdu.personal.cr.aliyuncs.com
  NAMESPACE: ych-dev
  IMAGE: tboom
  CONTAINER_NAME: tboom
  HOST_PORT: 5555

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          envs: REGISTRY,NAMESPACE,IMAGE,CONTAINER_NAME
          script: |
            docker login $REGISTRY \
              -u ${{ secrets.ALIYUN_REGISTRY_USER }} \
              -p ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

            docker pull $REGISTRY/$NAMESPACE/$IMAGE:latest

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              --restart always \
              -p $HOST_PORT:80 \
              $REGISTRY/$NAMESPACE/$IMAGE:latest

            docker image prune -f
